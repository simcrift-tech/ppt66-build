name: Build EXE + MAC + LINUX

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v3

    - name: Python 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 라이브러리 설치
      run: |
        pip install pyinstaller
        pip install -r requirements.txt

    - name: 빌드 실행
      run: |
        pyinstaller --onefile ppt66.py

    - name: 결과 업로드
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: dist/*
